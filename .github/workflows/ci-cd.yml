name: TechNova CI/CD

on:
  push:
    branches:
      - main
      - feature-devops
      - feature-monitoring

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  inventory-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: inventory-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pytest

      - name: Run Pytest
        run: |
          if [ -d tests ] && [ "$(find tests -name 'test_*.py' | wc -l)" -gt 0 ]; then
            pytest tests -v
          else
            echo "Tidak ada unit test, skip pytest."
          fi

      - name: Build Docker Image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t inventory-service .
          else
            echo "Dockerfile tidak ditemukan, skip build."
          fi
